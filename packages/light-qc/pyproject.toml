[project]
name = "light-qc"
version = "0.1.0"
description = "Standalone subtitle QC engine — rules + LLM"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "light-models",
    "typer>=0.15",
    "httpx>=0.27",
    "jinja2>=3.1",
    "pyyaml>=6.0",
    "rich>=13.0",
    "jieba>=0.42",
]

[tool.uv.sources]
light-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
light-qc = "light_qc.main:app"
