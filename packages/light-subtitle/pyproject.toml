[project]
name = "light-subtitle"
version = "0.1.0"
description = "ASR → translation → subtitle pipeline"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "light-models",
    "typer>=0.15",
    "httpx>=0.27",
    "jinja2>=3.1",
    "pyyaml>=6.0",
    "rich>=13.0",
    "jieba>=0.42",
    "openai>=1.0",
    "yt-dlp>=2024.0",
]

[tool.uv.sources]
light-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
light-subtitle = "light_subtitle.main:app"
